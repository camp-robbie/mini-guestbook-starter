<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니 방명록</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <div class="page">
    <main class="container">
      <header class="head">
        <h1>📖 미니 방명록</h1>
        <p class="subtitle">한 줄 남기고 가세요 :)</p>
      </header>

      <div class="form" id="form">
        <input id="name" placeholder="이름" maxlength="20">
        <input id="message" placeholder="메시지를 입력하세요">
        <button class="btn-primary" id="submit" onclick="addEntry()">등록</button>
      </div>

      <div id="list" class="gallery"></div>
    </main>

    <aside class="console">
      <div class="console-head">
        <span>🛰️ API 라이브 로그</span>
        <button class="console-clear" onclick="clearLog()">지우기</button>
      </div>
      <div id="log" class="log"></div>
      <p class="console-hint">등록·조회·삭제할 때마다 어떤 요청(POST·GET·DELETE)이 오가는지 실시간으로 보여줍니다!</p>
    </aside>
  </div>

  <!-- 단건 조회 모달 -->
  <div id="modal" class="modal" onclick="if (event.target === this) closeModal()">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
